version: '3.8'

services:
  # ============================================================
  # MySQL 8.0 — 交易数据 + Agent会话持久化
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: agentdine-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-103156}
      MYSQL_DATABASE: sky_take_out
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis 7.0 — 缓存 + 会话状态 + 用户偏好
  # ============================================================
  redis:
    image: redis:7.0-alpine
    container_name: agentdine-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-123456}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # Sky Server — Spring Boot 后端主服务
  # ============================================================
  agentdine-server:
    build:
      context: ./agentdine-server
      dockerfile: Dockerfile
    container_name: agentdine-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - SKY_DATASOURCE_HOST=mysql
      - SKY_DATASOURCE_PORT=3306
      - SKY_DATASOURCE_DATABASE=sky_take_out
      - SKY_DATASOURCE_USERNAME=root
      - SKY_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-103156}
      - SKY_REDIS_HOST=redis
      - SKY_REDIS_PORT=6379
      - SKY_REDIS_PASSWORD=${REDIS_PASSWORD:-123456}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================================
  # Nginx — 反向代理 + 负载均衡 + SSL
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: agentdine-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - agentdine-server

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
