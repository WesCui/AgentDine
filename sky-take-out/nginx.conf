worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_min_length 1000;
    gzip_types text/plain application/json text/css application/javascript text/xml;

    # Upstream: Sky Server cluster
    upstream sky_server_cluster {
        server sky-server:8080 weight=1 max_fails=3 fail_timeout=30s;
        # Additional instances can be added here:
        # server sky-server-2:8080 weight=1;
        keepalive 32;
    }

    # ============================================================
    # HTTP → HTTPS redirect (uncomment for production)
    # ============================================================
    # server {
    #     listen 80;
    #     server_name api.sky-takeout.com;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        server_name localhost;

        # ========================================================
        # AG-UI SSE Streaming — 长连接配置
        # ========================================================
        location /agui/chat {
            proxy_pass http://sky_server_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            chunked_transfer_encoding on;
        }

        location /agui/ {
            proxy_pass http://sky_server_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ========================================================
        # WebSocket — 实时推送
        # ========================================================
        location /ws/ {
            proxy_pass http://sky_server_cluster;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # ========================================================
        # Agent Chat API
        # ========================================================
        location /user/agent/ {
            proxy_pass http://sky_server_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }

        # ========================================================
        # General API
        # ========================================================
        location / {
            proxy_pass http://sky_server_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================================
        # Health check
        # ========================================================
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
